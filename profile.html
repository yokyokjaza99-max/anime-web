<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>โปรไฟล์</title>

<style>
body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:sans-serif;
background:linear-gradient(135deg,#07111f,#123b5c,#4b1d68);
color:white;
}

.card{
width:80%;
max-width:700px;
padding:40px;
text-align:center;
border-radius:30px;
background:rgba(255,255,255,0.12);
backdrop-filter:blur(10px);
box-shadow:0 0 40px rgba(0,195,255,0.35);
}

button{
margin-top:20px;
padding:16px 40px;
border:none;
border-radius:999px;
background:#00c3ff;
color:white;
font-size:22px;
cursor:pointer;
}
</style>

</head>

<body>

<div class="card">

<h1>โปรไฟล์ของหยก 😎</h1>

<p>ยินดีต้อนรับเข้าสู่หน้าโปรไฟล์</p>

<button onclick="window.location.href='index.html'">
กลับหน้าหลัก
</button>

</div>

</body>
</html>
