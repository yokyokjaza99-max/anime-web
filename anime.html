<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Anime Zone</title>

<style>

body{
margin:0;
font-family:sans-serif;
background:linear-gradient(135deg,#050816,#0f2f4d,#2a0d45);
color:white;
}

header{
padding:30px;
text-align:center;
font-size:55px;
font-weight:bold;
}

.banner{
width:90%;
max-width:1100px;
margin:auto;
padding:40px;
border-radius:30px;
background:rgba(255,255,255,0.08);
box-shadow:0 0 40px rgba(0,195,255,0.35);
text-align:center;
}

.banner img{
width:100%;
max-height:450px;
object-fit:cover;
border-radius:25px;
}

.banner h1{
font-size:50px;
margin-top:20px;
}

.banner p{
font-size:22px;
color:#dbeafe;
}

.anime-list{
display:flex;
gap:25px;
justify-content:center;
flex-wrap:wrap;
padding:50px;
}

.card{
width:260px;
padding:20px;
border-radius:25px;
background:rgba(255,255,255,0.10);
box-shadow:0 0 30px rgba(0,195,255,0.25);
text-align:center;
transition:0.3s;
}

.card:hover{
transform:scale(1.05);
}

.card img{
width:100%;
border-radius:20px;
height:320px;
object-fit:cover;
}

.card h2{
margin-top:15px;
}

button{
margin-top:15px;
padding:14px 35px;
border:none;
border-radius:999px;
background:#00c3ff;
color:white;
font-size:18px;
cursor:pointer;
box-shadow:0 0 25px #00c3ff;
}

button:hover{
background:#008cff;
}

.back{
display:flex;
justify-content:center;
padding-bottom:50px;
}

</style>
</head>

<body>

<header>
ANIME ZONE 🎌
</header>

<div class="banner">

<img src="https://images.unsplash.com/photo-1578632767115-351597cf2477?q=80&w=1400">

<h1>โลกอนิเมะของหยก 😎</h1>

<p>
รวมอนิเมะสุดมันส์ สไตล์เว็บเกมและนีออน
</p>

<button>ดูล่าสุด</button>

</div>

<div class="anime-list">

<div class="card">
<img src="https://i.imgur.com/9Xn4K8U.jpeg">
<h2>Dragon Ball</h2>
<button>ดูอนิเมะ</button>
</div>

<div class="card">
<img src="https://i.imgur.com/t9HFQvX.jpeg">
<h2>Naruto</h2>
<button>ดูอนิเมะ</button>
</div>

<div class="card">
<img src="https://i.imgur.com/eSNNM4p.jpeg">
<h2>One Piece</h2>
<button>ดูอนิเมะ</button>
</div>

</div>

<div class="back">
<button onclick="window.location.href='index.html'">
กลับหน้าหลัก
</button>
</div>

</body>
</html>
