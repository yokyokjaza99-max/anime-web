```html
<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ANIME KUNG</title>

<style>
body{
    margin:0;
    font-family:sans-serif;
    background:linear-gradient(135deg,#050816,#0f2f4d,#2a0d45);
    color:white;
}

header{
    text-align:center;
    padding:30px;
    font-size:50px;
    font-weight:bold;
    text-shadow:0 0 20px #00c3ff;
}

.search-box{
    width:90%;
    max-width:800px;
    margin:auto;
    text-align:center;
}

.search-box input{
    width:90%;
    padding:15px;
    border:none;
    border-radius:999px;
    font-size:18px;
}

.grid{
    width:90%;
    max-width:1200px;
    margin:30px auto;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:25px;
}

.card{
    background:rgba(255,255,255,0.08);
    border-radius:25px;
    padding:20px;
    text-align:center;
    box-shadow:0 0 25px rgba(0,195,255,0.2);
    transition:.3s;
}

.card:hover{
    transform:translateY(-5px);
    box-shadow:0 0 30px #00c3ff;
}

.card img{
    width:100%;
    height:320px;
    object-fit:cover;
    border-radius:20px;
}

.tag{
    display:inline-block;
    background:#00c3ff;
    padding:6px 12px;
    border-radius:999px;
    margin:3px;
    font-size:13px;
}

button{
    margin-top:15px;
    padding:12px 25px;
    border:none;
    border-radius:999px;
    background:#00c3ff;
    color:white;
    font-size:18px;
    cursor:pointer;
    box-shadow:0 0 15px #00c3ff;
}

.back{
    display:block;
    margin:30px auto;
}
</style>
</head>

<body>

<header>🎬 ANIME KUNG</header>

<div class="search-box">
<input
id="searchInput"
type="text"
placeholder="ค้นหาอนิเมะ..."
onkeyup="searchAnime()">
</div>

<div class="grid" id="animeGrid">

<div class="card" data-name="dragon ball">
<img src="https://i.imgur.com/qIufhof.jpeg">
<h2>Dragon Ball</h2>

<span class="tag">ต่อสู้</span>
<span class="tag">พลัง</span>
<span class="tag">แฟนตาซี</span>

<br>

<button onclick="openAnime('Dragon Ball')">
ดูรายละเอียด
</button>
</div>

<div class="card" data-name="naruto">
<img src="https://i.imgur.com/tV4vY7D.jpeg">
<h2>Naruto</h2>

<span class="tag">นินจา</span>
<span class="tag">ผจญภัย</span>
<span class="tag">มิตรภาพ</span>

<br>

<button onclick="openAnime('Naruto')">
ดูรายละเอียด
</button>
</div>

<div class="card" data-name="one piece">
<img src="https://i.imgur.com/xo8Xx7x.jpeg">
<h2>One Piece</h2>

<span class="tag">โจรสลัด</span>
<span class="tag">ผจญภัย</span>
<span class="tag">ตลก</span>

<br>

<button onclick="openAnime('One Piece')">
ดูรายละเอียด
</button>
</div>

</div>

<button class="back"
onclick="window.location.href='index.html'">
กลับหน้าหลัก
</button>

<script>

function searchAnime(){

let input =
document.getElementById("searchInput")
.value.toLowerCase();

let cards =
document.querySelectorAll(".card");

cards.forEach(card=>{

let name =
card.dataset.name.toLowerCase();

if(name.includes(input)){
card.style.display="block";
}else{
card.style.display="none";
}

});

}

function openAnime(name){

window.location.href =
"anime-detail.html?anime=" +
encodeURIComponent(name);

}

</script>

</body>
</html>
```
