<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ANIME ZONE</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  color:white;
  background:linear-gradient(135deg,#050816,#0f2f4d,#2a0d45);
}

.header{
  text-align:center;
  padding:30px;
  font-size:45px;
  font-weight:bold;
}

.box{
  width:90%;
  max-width:1100px;
  margin:25px auto;
  padding:25px;
  border-radius:25px;
  background:rgba(255,255,255,0.10);
  box-shadow:0 0 35px rgba(0,195,255,0.35);
}

.player iframe{
  width:100%;
  height:520px;
  border:0;
  border-radius:20px;
  background:black;
}

.episodes{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
  gap:15px;
  margin-top:25px;
}

button{
  padding:14px;
  border:none;
  border-radius:999px;
  background:#00c3ff;
  color:white;
  font-size:18px;
  cursor:pointer;
  box-shadow:0 0 20px #00c3ff;
}

button:hover{
  background:#008cff;
  transform:scale(1.05);
}

.desc{
  line-height:1.8;
  color:#dbeafe;
}

@media(max-width:600px){
  .player iframe{height:260px;}
  .header{font-size:32px;}
}
</style>
</head>

<body>

<div class="header">🎬 ANIME ZONE</div>

<div class="box">
  <h1>หมออมตะเมืองโบราณ</h1>
  <p class="desc">
    เลือกตอนที่ต้องการรับชม ระบบจะเปลี่ยนวิดีโอให้อัตโนมัติ
  </p>
</div>

<div class="box player">
  <h2 id="episodeTitle">ตอนที่ 1</h2>

  <iframe id="animePlayer"
    src="https://streamtape.com/e/ใส่รหัสคลิปตรงนี้/"
    allowfullscreen>
  </iframe>
</div>

<div class="box">
  <h2>รายการตอน</h2>

  <div class="episodes">
    <button onclick="playEpisode('ตอนที่ 1','https://streamtape.com/e/ใส่รหัสตอน1/')">ตอนที่ 1</button>
    <button onclick="playEpisode('ตอนที่ 2','https://filemoon.sx/e/ใส่รหัสตอน2')">ตอนที่ 2</button>
    <button onclick="playEpisode('ตอนที่ 3','https://voe.sx/e/ใส่รหัสตอน3')">ตอนที่ 3</button>
    <button onclick="playEpisode('ตอนที่ 4','https://vidhide.com/embed/ใส่รหัสตอน4')">ตอนที่ 4</button>
  </div>

  <br>
  <button onclick="window.location.href='index.html'">กลับหน้าหลัก</button>
</div>

<script>
function playEpisode(title, link){
  document.getElementById("episodeTitle").innerHTML = title;
  document.getElementById("animePlayer").src = link;
  window.scrollTo({top:0, behavior:"smooth"});
}
</script>

</body>
</html>
