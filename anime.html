<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Anime Zone</title>

<style>
body{
    margin:0;
    font-family:sans-serif;
    background:linear-gradient(135deg,#050816,#0f2f4d,#2a0d45);
    color:white;
    overflow-x:hidden;
}

header{
    padding:30px;
    text-align:center;
    font-size:55px;
    font-weight:bold;
}

.banner{
    width:90%;
    max-width:1100px;
    margin:auto;
    padding:40px;
    border-radius:30px;
    background:rgba(255,255,255,0.08);
    box-shadow:0 0 30px rgba(0,195,255,0.35);
    text-align:center;
}

iframe{
    width:100%;
    height:500px;
    border:none;
    border-radius:25px;
    margin-top:25px;
}

.anime-list{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:25px;
    margin-top:40px;
}

.card{
    background:rgba(255,255,255,0.08);
    border-radius:25px;
    padding:20px;
    text-align:center;
    transition:0.3s;
}

.card:hover{
    transform:scale(1.05);
    box-shadow:0 0 25px cyan;
}

.card img{
    width:100%;
    height:330px;
    object-fit:cover;
    border-radius:20px;
}

button{
    margin-top:15px;
    padding:12px 30px;
    border:none;
    border-radius:999px;
    background:#00c3ff;
    color:white;
    font-size:18px;
    cursor:pointer;
    box-shadow:0 0 20px #00c3ff;
    transition:0.3s;
}

button:hover{
    transform:scale(1.08);
    background:#008cff;
}

.back-btn{
    margin:30px auto;
    display:block;
}

@media(max-width:600px){
    header{
        font-size:38px;
    }

    .banner{
        padding:20px;
    }

    iframe{
        height:250px;
    }
}
</style>
</head>

<body>

<header>
🎬 ANIME ZONE
</header>

<div class="banner">

<h2>โลกอนิเมะของหยก 😎</h2>
<p>รวมตัวอย่างอนิเมะสุดมันส์ ดูได้แบบถูกลิขสิทธิ์</p>

<iframe 
src="https://www.youtube.com/embed/kVdlBxdqv8s"
allowfullscreen>
</iframe>

<div class="anime-list">

<div class="card">
<img src="https://i.imgur.com/qIufhof.jpeg">
<h2>Dragon Ball</h2>
<button onclick="window.open('https://youtu.be/kVdlBxdqv8s')">
รับชม
</button>
</div>

<div class="card">
<img src="https://i.imgur.com/tV4vY7D.jpeg">
<h2>Naruto</h2>
<button onclick="window.open('https://youtu.be/-G9BqkgZXRA')">
รับชม
</button>
</div>

<div class="card">
<img src="https://i.imgur.com/xo8Xx7x.jpeg">
<h2>One Piece</h2>
<button onclick="window.open('https://youtu.be/S8_YwFLCh4U')">
รับชม
</button>
</div>

</div>

<button class="back-btn" onclick="window.location.href='index.html'">
กลับหน้าหลัก
</button>

</div>

</body>
</html>
