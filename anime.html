<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ANIME KUNG</title>

<style>
body{
  margin:0;
  min-height:100vh;
  font-family:sans-serif;
  background:linear-gradient(135deg,#07111f,#123b5c,#3b0f4a);
  display:flex;
  justify-content:center;
  align-items:center;
  color:white;
}

.card{
  width:80%;
  max-width:850px;
  padding:45px;
  text-align:center;
  border-radius:30px;
  background:rgba(255,255,255,0.12);
  border:1px solid rgba(255,255,255,0.25);
  box-shadow:0 0 40px rgba(0,195,255,0.35);
}

h1{
  font-size:55px;
}

img{
  width:350px;
  max-width:90%;
  border-radius:20px;
}

input{
  width:300px;
  max-width:90%;
  padding:15px;
  margin:8px;
  border:none;
  border-radius:15px;
  font-size:18px;
  text-align:center;
}

button{
  margin:8px;
  padding:16px 35px;
  border:none;
  border-radius:999px;
  background:#00c3ff;
  color:white;
  font-size:20px;
  cursor:pointer;
  box-shadow:0 0 25px #00c3ff;
}
</style>
</head>

<body>

<div class="card" id="app">
  <h1>โปรเจคหยก 🚀</h1>
  <img src="goku.gif.gif">

  <br><br>
  <input id="username" type="text" placeholder="ชื่อผู้ใช้">
  <input id="password" type="password" placeholder="รหัสผ่าน" onkeypress="enterLogin(event)">
  <br>
  <button onclick="login()">เข้าสู่ระบบ</button>

  <p>ระบบสมาชิก ANIME KUNG</p>
</div>

<script>
const users = [
  { user:"inwyok", pass:"056360067", role:"admin", name:"หยก" },
  { user:"member1", pass:"111111", role:"member", name:"สมาชิก 1" },
  { user:"member2", pass:"222222", role:"member", name:"สมาชิก 2" }
];

function login(){
  let username = document.getElementById("username").value.trim();
  let password = document.getElementById("password").value.trim();

  let foundUser = users.find(u => u.user === username && u.pass === password);

  if(foundUser){
    localStorage.setItem("login","yes");
    localStorage.setItem("username",foundUser.user);
    localStorage.setItem("role",foundUser.role);
    localStorage.setItem("displayName",foundUser.name);
    showDashboard();
  }else{
    alert("ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง ❌");
  }
}

function showDashboard(){
  let name = localStorage.getItem("displayName");
  let role = localStorage.getItem("role");

  let adminButton = "";

  if(role === "admin"){
    adminButton = `
      <button onclick="window.location.href='admin.html'">
        แอดมิน
      </button>
    `;
  }

  document.body.innerHTML = `
  <div class="card">
    <h1>ANIME KUNG 😎</h1>
    <p>ยินดีต้อนรับ ${name}</p>
    <p>สถานะ: ${role}</p>
    <p id="clock"></p>

    <img src="goku.gif.gif">

    <div>
      <button onclick="window.location.href='profile.html'">โปรไฟล์</button>
      <button onclick="window.location.href='member.html'">สมาชิก</button>
      <button onclick="window.location.href='setting.html'">ตั้งค่า</button>
      <button onclick="window.location.href='anime.html'">อนิเมะ</button>
      ${adminButton}
    </div>

    <button onclick="logout()">ออกจากระบบ</button>
  </div>
  `;

  setInterval(() => {
    let clock = document.getElementById("clock");
    if(clock){
      clock.innerHTML = new Date().toLocaleTimeString();
    }
  },1000);
}

function enterLogin(event){
  if(event.key === "Enter"){
    login();
  }
}

function logout(){
  localStorage.clear();
  location.reload();
}

window.onload = function(){
  if(localStorage.getItem("login") === "yes"){
    showDashboard();
  }
}
</script>

</body>
</html>
